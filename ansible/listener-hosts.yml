---
# Inventory for the bitcoin-listener playbook (github.com/lightwebinc/bitcoin-listener).
# Invoke via:  cd ~/repo/bitcoin-listener/ansible &&
#              ansible-playbook -i ~/repo/bitcoin-multicast-test/ansible/listener-hosts.yml site.yml
#
# Pinned subtree IDs (reproducibility):
#   Generated with:
#     subtx-gen -subtrees 8 -subtree-seed 'lax-lab-2026' -print-subtrees
#   Listener 2 excludes index 2; Listener 3 includes only index 5.
#   To rotate, regenerate the pool and update the hex strings below.

all:
  children:
    listener_nodes:
      vars:
        ansible_user: ubuntu
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
        ingress_mode: ethernet
        shard_bits: 2
        mc_scope: site
        listen_port: 9001
        enable_firewall: true
        enable_bgp: false
        # NOTE: mgmt_cidrs_v4/v6 and num_workers are set per-host below.
        # They CANNOT be group-level here because bitcoin-listener's
        # group_vars/all.yml defines the same variables and group_vars/all
        # wins over inventory group vars in Ansible precedence.
        egress_addr: "127.0.0.1:9100"
        egress_proto: "udp"
        strip_header: false
        metrics_addr: ":9200"
        # NOTE: retry_endpoints MUST be set per-host (see precedence note above);
        # bitcoin-listener's group_vars/all.yml defines the same variable.

      hosts:
        listener1:
          ansible_host: 10.10.10.31
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          retry_endpoints: "[fd20::24]:9300"
          # Defaults: listen to all shards, all subtrees.

        listener2:
          ansible_host: 10.10.10.32
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          shard_include: "0,1"
          subtree_exclude: "836021c2a5ae8e281101f1031d3cf2a483e483cf387380169fb523b5b0700a42"
          retry_endpoints: "[fd20::24]:9300"

        listener3:
          ansible_host: 10.10.10.33
          ingress_iface: enp6s0
          num_workers: 1
          mgmt_cidrs_v4: ["10.10.10.0/24"]
          mgmt_cidrs_v6: ["fd20::/64"]
          subtree_include: "07015348bf979f23c167d39727aa4d9928fb77c8e51d34ea1e7f27840f956dbb"
          retry_endpoints: "[fd20::24]:9300"
